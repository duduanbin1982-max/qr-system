# Nginx reverse proxy for qr-system
# Usage: sudo cp this file to /etc/nginx/sites-available/qr-system
#        sudo ln -s /etc/nginx/sites-available/qr-system /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /home/dubin/qr-system/server.crt;
    ssl_certificate_key /home/dubin/qr-system/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Request limits
    client_max_body_size 16m;
    client_body_buffer_size 128k;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # Rate limiting — 60 req/s per IP burst 20

    # Static files — served directly by nginx
    location /static/ {
        alias /home/dubin/qr-system/public/static/;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Proxy to Gunicorn (change to 127.0.0.1:3000 after modifying gunicorn bind)
    location / {
        proxy_pass https://127.0.0.1:3000;
        proxy_ssl_verify off;  # self-signed cert
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
