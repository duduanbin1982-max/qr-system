<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>离线 - 扫码报工</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#f3f4f6;color:#374151}
.icon{font-size:64px;margin-bottom:16px}
h1{font-size:20px;margin-bottom:8px}
p{font-size:14px;color:#6b7280;margin-bottom:24px}
button{padding:10px 24px;background:#4F46E5;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer}
button:hover{background:#4338CA}
</style>
</head>
<body>
<div class="icon">📱</div>
<h1>当前处于离线模式</h1>
<p>请检查网络连接后重试</p>
<button id="btn-reload">重新加载</button>
<script nonce="{$ nonce $}">document.getElementById("btn-reload").addEventListener("click",function(){location.reload()});</script>
</body>
</html>
