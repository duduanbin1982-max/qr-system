<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover,target-densitydpi=device-dpi">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1890ff">
<meta http-equiv="Permissions-Policy" content="camera=(self)">
<title>扫码报工</title>
<link rel="manifest" href="/manifest.json">
<script src="scan-enhance.js"></script>
<script src="jsQR.js"></script>
<link rel="stylesheet" href="/style.css?v=71">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;min-height:100vh;min-height:calc(var(--vh,1vh)*100)}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg-page);color:var(--text-primary);font-size:15px;overflow:hidden;height:100%;min-height:100vh;min-height:calc(var(--vh,1vh)*100);-webkit-user-select:none;user-select:none}
.screen{display:none;height:100%;min-height:100vh;min-height:calc(var(--vh,1vh)*100);flex-direction:column;transition:opacity .2s ease}.screen.active{display:flex}
input,textarea,select{font-size:16px !important}

/* Login */
.login-screen{background:linear-gradient(135deg,var(--primary),var(--primary-dark));justify-content:center;align-items:center;padding:var(--space-5)}
.login-box{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 12px 40px rgba(0,0,0,.25)}
.login-box h1{text-align:center;font-size:22px;margin-bottom:var(--space-1)}
.login-box .sub{text-align:center;color:var(--text-muted);font-size:var(--text-sm);margin-bottom:20px}
.login-box label{display:block;font-size:var(--text-sm);color:var(--text-muted);margin-bottom:6px;font-weight:500}
.login-box input{width:100%;padding:var(--space-3) 14px;border:1px solid var(--border-input);border-radius:var(--radius-md);font-size:15px;outline:none;background:var(--bg-input)}
.login-box input:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(24,144,255,.12)}
.form-group{margin-bottom:var(--space-4)}
.btn-login{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-md);font-size:var(--text-lg);font-weight:600;cursor:pointer;margin-top:8px}
.btn-login:disabled{background:var(--info-lighter);opacity:.55;cursor:not-allowed}
.login-error{color:var(--danger);font-size:var(--text-sm);text-align:center;margin-top:10px;min-height:18px}

/* Top bar (compact) */
.top-bar{background:var(--primary);color:#fff;padding:10px 16px;padding-top:10px;padding-top:calc(10px + constant(safe-area-inset-top));padding-top:calc(10px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.top-bar .top-user{font-size:14px;opacity:.9}

/* Hero scan */
.hero-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 0}
.hero-scan{width:130px;height:130px;border-radius:50%;background:var(--primary);color:#fff;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;box-shadow:0 8px 32px rgba(24,144,255,.35);-webkit-tap-highlight-color:transparent;transition:transform .15s ease}
.hero-scan:active{transform:scale(.94)}
.hero-scan .hero-icon{font-size:40px;line-height:1}
.hero-scan .hero-label{font-size:15px;font-weight:600}
.hero-stats{margin-top:20px;font-size:var(--text-sm);color:var(--text-muted);display:flex;gap:4px;align-items:center}
.hero-stats strong{color:var(--text-primary);font-size:16px}
.hero-stats .stat-sep{margin:0 4px;color:var(--border-light)}
/* Sub actions */
.sub-actions{display:flex;justify-content:center;gap:24px;padding:8px 0 16px}
.sub-btn{background:none;border:none;color:var(--primary);font-size:14px;cursor:pointer;padding:8px 12px;border-radius:20px;transition:background .15s}
.sub-btn:active{background:var(--info-light)}
/* Bottom bar */
.bottom-bar{display:flex;justify-content:center;padding:12px 16px;padding-bottom:12px;padding-bottom:calc(12px + constant(safe-area-inset-bottom));padding-bottom:calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--border-light);flex-shrink:0}
.bottom-link{font-size:13px;color:var(--text-muted);cursor:pointer;padding:6px 16px}
/* Main body */
.main-body{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.main-body::-webkit-scrollbar{width:0}
/* Manual input (hidden by default) */
.manual-row{display:none;gap:var(--space-3);padding:8px 16px}
.manual-row input{flex:1;padding:10px 14px;border:1px solid var(--border-input);border-radius:20px;font-size:15px;background:var(--bg-input);outline:none}
.manual-row input:focus{border-color:var(--primary)}
.manual-row button{padding:10px 18px;background:var(--primary);color:#fff;border:none;border-radius:20px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap}
.manual-row button:active{background:var(--primary-dark)}

/* Recent records */
.recent-section{margin-top:4px}
.recent-title{font-size:var(--text-sm);font-weight:600;color:var(--text-muted);margin-bottom:var(--space-2);display:flex;align-items:center;justify-content:space-between}
.recent-item{background:#fff;border-radius:var(--radius-md);padding:var(--space-3) 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.recent-item .ri-left{flex:1;min-width:0}
.recent-item .ri-no{font-size:var(--text-sm);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.recent-item .ri-meta{font-size:var(--text-xs-alt);color:var(--text-muted);margin-top:2px}
.recent-item .ri-type{font-size:var(--text-xs-alt);padding:var(--space-1) 8px;border-radius:var(--radius-md);white-space:nowrap;margin-left:8px}
.ri-type.normal{background:var(--success-light);color:var(--success)}
.ri-type.scrap{background:var(--danger-light);color:var(--danger)}
.ri-type.rework{background:var(--warning-light);color:var(--warning)}
.empty-recent{text-align:center;color:var(--text-muted);font-size:var(--text-sm);padding:var(--space-6) 0}

/* Order */
.order-body{flex:1;overflow-y:auto;padding:var(--space-4);display:flex;flex-direction:column;gap:var(--space-3)}
.order-body::-webkit-scrollbar{width:0}
.order-header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-radius:var(--radius-lg);padding:var(--space-5) 18px}
.order-header .no{font-size:var(--text-2xl);font-weight:700;margin-bottom:6px}
.order-header .row{display:flex;justify-content:space-between;font-size:var(--text-sm);opacity:.9;margin-top:4px}
.cur-proc{background:#fff;border-radius:var(--radius-lg);padding:18px 16px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:2px solid var(--primary)}
.cur-proc .badge{background:var(--primary);color:#fff;font-size:var(--text-xs);padding:3px 10px;border-radius:var(--radius-md);display:inline-block;margin-bottom:var(--space-2)}
.cur-proc .name{font-size:var(--text-2xl);font-weight:700;margin-bottom:var(--space-1)}
.cur-proc .sub{font-size:var(--text-sm);color:var(--text-muted)}
.serial-card{background:#fff;border-radius:var(--radius-lg);padding:var(--space-3) 16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.serial-card .label{font-size:var(--text-xs);color:var(--text-muted);margin-bottom:var(--space-1)}
.serial-card .val{font-size:15px;font-weight:600;font-family:monospace}
.proc-card{background:#fff;border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.proc-card .title{padding:var(--space-3) 16px;font-size:var(--text-sm);font-weight:600;color:var(--text-muted);background:var(--bg-input);border-bottom:1px solid var(--border-light)}
.proc-item{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border-light);gap:10px}
.proc-item:last-child{border-bottom:none}
.proc-item.done{opacity:.5}
.pi-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:var(--text-base);flex-shrink:0;font-weight:600}
.proc-item.done .pi-icon{background:var(--success-lighter);color:var(--success)}
.proc-item.active .pi-icon{background:var(--primary-light);color:var(--primary)}
.proc-item.pending .pi-icon{background:var(--bg-hover);color:var(--text-muted)}
.pi-info{flex:1}
.pi-name{font-weight:500;font-size:14px}
.pi-meta{font-size:var(--text-xs);color:var(--text-muted);margin-top:2px}
.pi-st{font-size:var(--text-xs);padding:var(--space-1) 10px;border-radius:var(--radius-md)}
.proc-item.done .pi-st{background:var(--success-light);color:var(--success);border:1px solid var(--success-lighter)}
.proc-item.active .pi-st{background:var(--info-light);color:var(--primary);border:1px solid var(--info-lighter)}
.proc-item.pending .pi-st{background:var(--bg-input);color:var(--text-muted);border:1px solid var(--border-input)}

/* Report mode */
.mode-toggle{display:flex;background:var(--bg-hover);border-radius:var(--radius-md);padding:3px;gap:var(--space-1)}
.mode-btn{flex:1;padding:var(--space-3) 8px;border:none;border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:500;cursor:pointer;background:transparent;color:var(--text-muted);transition:all .2s}
.mode-btn.active{background:#fff;color:var(--primary);box-shadow:0 2px 4px rgba(0,0,0,.08)}
.report-form{background:#fff;border-radius:var(--radius-lg);padding:var(--space-3) 16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.report-form .rf-row{display:flex;gap:var(--space-3);align-items:flex-end;margin-bottom:10px}
.report-form .rf-col{flex:1}
.report-form label{display:block;font-size:var(--text-xs);color:var(--text-muted);margin-bottom:var(--space-1)}
.report-form input,.report-form select{width:100%;padding:var(--space-3) 12px;border:1px solid var(--border-input);border-radius:var(--radius-md);font-size:15px;background:#fff;outline:none}
.report-form input:focus,.report-form select:focus{border-color:var(--primary)}
.report-type-group{display:flex;gap:var(--space-2)}
.report-type-opt{flex:1;text-align:center;padding:14px 4px;border:2px solid var(--border-light);border-radius:var(--radius-md);font-size:var(--text-sm);cursor:pointer;transition:all .2s}
.report-type-opt.active{border-color:var(--primary);background:var(--info-light);color:var(--primary);font-weight:600}
.report-type-opt.scrap.active{border-color:var(--danger);background:var(--danger-light);color:var(--danger)}
.report-type-opt.rework.active{border-color:var(--warning);background:var(--warning-light);color:var(--warning-dark)}

/* Action */
.action-area{padding:var(--space-3) 16px;padding-bottom:var(--space-3);padding-bottom:calc(var(--space-3) + constant(safe-area-inset-bottom));padding-bottom:calc(var(--space-3) + env(safe-area-inset-bottom));background:#fff;border-top:1px solid var(--border-light);flex-shrink:0}
.btn-report{width:100%;padding:14px;background:var(--success);color:#fff;border:none;border-radius:var(--radius-md);font-size:17px;font-weight:700;cursor:pointer}
.btn-report:active{background:var(--success-dark)}
.btn-report:disabled{background:var(--success-lighter);opacity:.55;cursor:not-allowed}
.btn-report.scrap{background:var(--danger)}
.btn-report.scrap:active{background:var(--danger-dark)}
.btn-report.rework{background:var(--warning);color:#fff}
.btn-report.rework:active{background:var(--warning-dark)}

/* Success */
.success-screen{justify-content:center;align-items:center;padding:var(--space-5);background:linear-gradient(135deg,var(--success-light),var(--info-light))}
.success-box{background:#fff;border-radius:20px;padding:32px 24px;text-align:center;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.success-icon{width:64px;height:64px;background:var(--success-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:48px;color:var(--success)}
.success-box h2{font-size:var(--text-2xl);margin-bottom:var(--space-2)}
.success-box p{font-size:var(--text-base);color:var(--text-muted);margin-bottom:var(--space-3)}
.success-box .detail{background:var(--bg-input);border-radius:var(--radius-md);padding:var(--space-3);font-size:var(--text-sm);color:var(--text-muted);margin-bottom:var(--space-5);text-align:left;line-height:1.8}
.btn-done{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-md);font-size:var(--text-lg);font-weight:600;cursor:pointer}
.btn-done:active{background:var(--primary-dark)}

/* Scanner */
.scanner-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;justify-content:center;align-items:center;z-index:100}
.scan-controls{position:absolute;top:16px;top:calc(16px + constant(safe-area-inset-top));top:calc(16px + env(safe-area-inset-top));left:16px;left:clamp(12px, 3vw, 24px);right:16px;right:clamp(12px, 3vw, 24px);display:flex;justify-content:space-between;z-index:10}
.close-btn,.flash-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:40px;width:clamp(36px, 10vw, 48px);height:40px;height:clamp(36px, 10vw, 48px);border-radius:50%;font-size:20px;font-size:clamp(18px, 6vw, 24px);cursor:pointer;display:flex;align-items:center;justify-content:center}
.close-btn:active,.flash-btn:active{background:rgba(255,255,255,.4)}
.flash-btn.off{opacity:.4}
#cam-video{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
#cam-canvas{position:absolute;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none}
.scan-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:2}
.scan-box{width:240px;width:min(70vw, 280px);height:240px;height:min(70vw, 280px);position:relative;border-radius:18px;border-radius:clamp(16px, 6%, 24px)}
.scan-box .line{position:absolute;left:10%;width:80%;height:2px;background:linear-gradient(90deg,transparent,var(--primary),transparent);border-radius:1px;animation:scanLine 1.8s ease-in-out infinite;box-shadow:0 0 10px rgba(24,144,255,.5)}
@keyframes scanLine{0%,100%{top:10%}50%{top:85%}}
.scan-box .c{position:absolute;width:12%;height:12%;border-color:var(--primary);border-style:solid}
.c1{top:0;left:0;border-width:3px 0 0 3px;border-radius:40% 0 0 0}
.c2{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 40% 0 0}
.c3{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 40%}
.c4{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 40% 0}
.scan-tip{color:rgba(255,255,255,.8);font-size:13px;font-size:clamp(12px, 3.5vw, 14px);margin-top:16px;margin-top:clamp(12px, 5vw, 24px);text-shadow:0 1px 4px rgba(0,0,0,.8)}
.scan-engine{font-size:11px;font-size:clamp(10px, 3vw, 12px);color:var(--primary);margin-top:6px;margin-top:clamp(4px, 1.5vw, 8px);text-shadow:0 1px 4px rgba(0,0,0,.8);min-height:16px}

/* ── Retina: thicker scan line & corner borders ── */
@media (min-resolution: 2dppx) {
  .scan-box .line{height:2px}
  .scan-box .c{border-width:4px 0 0 4px}
}
@media (min-resolution: 3dppx) {
  .scan-box .line{height:3px}
}

/* ── Landscape: vh-based box, hide tip ── */
@media (orientation: landscape) and (max-height: 500px) {
  .scan-box{width:200px;width:min(50vh, 240px);height:200px;height:min(50vh, 240px)}
  .scan-tip{display:none}
  .scan-controls{top:8px;top:clamp(4px, 2vw, 12px)}
}

/* ── Tablet: larger scan box ── */
@media (min-width: 768px) {
  .scan-box{width:360px;height:360px}
  .scan-box .c{width:14%;height:14%}
}

/* ── Small phone: tighter box ── */
@media (max-width: 359px) {
  .scan-box{width:65vw;height:65vw}
  .scan-tip{font-size:11px;margin-top:8px}
}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:12px 28px;border-radius:24px;font-size:var(--text-base);z-index:9999;pointer-events:none;transition:opacity .25s ease;backdrop-filter:blur(4px)}
.back-bar{background:#fff;color:var(--text-primary);border-bottom:1px solid var(--border-light);padding:var(--space-3) 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
/* Scan flash */
.scan-flash{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(82,196,26,.25);z-index:200;pointer-events:none;transition:opacity .4s ease}
/* Empty state */
.empty-recent .icon{font-size:32px;margin-bottom:8px;display:block;opacity:.4}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="s-login" class="screen login-screen active">
<div class="login-box">
<h1>扫码报工</h1><p class="sub">手机端快速报工</p>
<div class="form-group"><label>用户名</label><input type="text" id="inp-user" placeholder="请输入用户名" autocomplete="off"></div>
<div class="form-group"><label>密码</label><input type="password" id="inp-pwd" placeholder="请输入密码"></div>
<button class="btn-login" id="btn-login">登 录</button>
<div class="login-error" id="login-err"></div>
</div>
</div>

<!-- MAIN -->
<div id="s-main" class="screen">
<div class="top-bar"><span class="top-user" id="top-user">扫码报工</span></div>
<div class="main-body">
<div class="hero-area">
<button class="hero-scan"><span class="hero-icon">📷</span><span class="hero-label">扫码报工</span></button>
<div class="hero-stats"><span>今日 <strong id="st-today">0</strong> 次</span><span class="stat-sep">·</span><span><strong id="st-qty">0</strong> 件</span></div>
</div>
<div class="sub-actions">
<button class="sub-btn">📸 拍照识别</button>
<button class="sub-btn">✏️ 手动输入</button>
</div>
<div class="manual-row" id="manual-row"><input type="text" id="inp-code" placeholder="输入订单号或序列号" autocomplete="off"><button>查询</button></div>
<input type="file" id="photo-input" accept="image/*" style="display:none">
<div class="recent-section" id="recent-section">
<div class="recent-title"><span>📋 最近报工</span><span style="font-size:var(--text-xs-alt);color:#bbb;font-weight:400;cursor:pointer">刷新</span></div>
<div id="recent-list"><div class="empty-recent"><span class="icon">📋</span>暂无记录</div></div>
</div>
<div class="bottom-bar"><span class="bottom-link">退出登录</span></div>
</div>
</div>

<!-- ORDER -->
<div id="s-order" class="screen">
<div class="back-bar">
<button class="top-btn" style="color:var(--text-primary);background:var(--bg-hover)">← 返回</button>
<h1 style="font-size:var(--text-lg);color:#333">报工确认</h1><div style="width:60px"></div>
</div>
<div class="order-body" id="order-body"></div>
<div class="action-area">
<div class="mode-toggle" style="margin-bottom:10px">
<button class="mode-btn active" id="mode-auto">⚡ 自动报工</button>
<button class="mode-btn" id="mode-manual">✋ 手动报工</button>
</div>
<div class="report-form" id="report-form" style="display:none">
<div class="report-type-group" style="margin-bottom:10px">
<div class="report-type-opt active" id="rtype-normal">✅ 正常</div>
<div class="report-type-opt scrap" id="rtype-scrap">❌ 报废</div>
<div class="report-type-opt rework" id="rtype-rework">🔧 返修</div>
</div>
<div class="rf-row">
<div class="rf-col"><label>报工数量</label><input type="number" id="rpt-qty" min="1" placeholder="数量"></div>
</div>
<div class="rf-row" id="reason-row" style="display:none">
<div class="rf-col"><label>原因说明</label><input type="text" id="rpt-reason" placeholder="报废/返修原因"></div>
</div>
</div>
<button class="btn-report" id="btn-report">提交报工</button>
</div>
</div>

<!-- SUCCESS -->
<div id="s-ok" class="screen success-screen">
<div class="success-box">
<div class="success-icon">✓</div>
<h2>报工成功!</h2>
<p id="ok-msg"></p>
<div class="detail" id="ok-detail"></div>
<button class="btn-done">继续扫码</button>
</div>
</div>

<!-- SCANNER -->
<div id="s-scan" class="screen scanner-screen">
<div class="scan-controls">
<button class="flash-btn off" id="flash-btn" title="闪光灯">⚡</button>
<button class="close-btn">✕</button>
</div>
<video id="cam-video" autoplay playsinline muted></video>
<canvas id="cam-canvas"></canvas>
<div class="scan-overlay">
<div class="scan-box">
<div class="line"></div>
<div class="c c1"></div><div class="c c2"></div><div class="c c3"></div><div class="c c4"></div>
</div>
<div class="scan-tip">将二维码放入框内自动扫描</div>
<div class="scan-engine" id="scan-engine"></div>
</div>
</div>

<script nonce="{$ nonce $}">
'use strict';

// ═══════════════════════════════════════════
//  扫码报工系统 — 手机扫码模块 v3
//  双引擎：BarcodeDetector (硬件加速) + jsQR (纯JS通用降级)
// ═══════════════════════════════════════════

const API = '/api';

// ── 状态 ──────────────────────────────────
let curOrder   = null;
let curProcId  = null;
let curSerial  = '';
let camStream  = null;
let scanTimer  = null;
let lastCode   = '';
let lastTime   = 0;
let reportMode = 'auto';
let reportType = 'normal';
let bd         = null;  // BarcodeDetector 实例
let flashOn    = false;

// ── 工具函数 ──────────────────────────────
const $ = function(id) { return document.getElementById(id); };

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toast(msg, ms) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 300); }, ms || 2000);
}

// Auth: dual channel — httpOnly cookie (primary) + Bearer token (fallback).
// phone browsers may drop non-Secure cookies on HTTPS; Bearer is backup.
function token()  { try { return sessionStorage.getItem('qr_token') || ''; } catch(e) { return ''; } }
function user()   {
  if (window.__qr_user) return window.__qr_user;
  try { var u = JSON.parse(sessionStorage.getItem('qr_user')); if (u) { window.__qr_user = u; return u; } } catch(e) {}
  return null;
}

function show(id) {
  const screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
  $('s-' + id).classList.add('active');
}

// ═══════════════════════════════════════════
//  双引擎扫码模块
// ═══════════════════════════════════════════

// ── 引擎检测 ────────────────────────────────
function initBD() {
  if (typeof BarcodeDetector !== 'undefined') {
    try {
      bd = new BarcodeDetector({ formats: ['qr_code'] });
      return true;
    } catch(e) {}
  }
  return false;
}

// ── 打开摄像头 ──────────────────────────────
function openCam() {
  show('scan');

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    toast('此浏览器不支持摄像头，请使用拍照解码');
    show('main');
    return;
  }

  let hasBD = false;  // 强制jsQR：华为BarcodeDetector.detect(video)不可靠
  $('scan-engine').textContent = '引擎: jsQR (通用软件解码)';

  const video = $('cam-video');
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
  })
  .then(function(stream) {
    camStream = stream;
    video.srcObject = stream;
    video.play().then(function() {
      if (hasBD) { startBD(video); }
      else { startJsQR(video); }
    });
  })
  .catch(function(err) {
    var msg;
    if (err.name === 'NotAllowedError')
      msg = '摄像头权限被拒绝。请在浏览器设置中允许摄像头，或使用拍照解码';
    else if (err.name === 'NotFoundError')
      msg = '未检测到摄像头设备';
    else if (err.name === 'NotReadableError')
      msg = '摄像头被其他应用占用';
    else
      msg = '摄像头错误: ' + (err.message || err.name || '未知');
    toast(msg, 5000);
    show('main');
  });
}

// ── 路径1: BarcodeDetector (Chrome 硬件加速) ──
function startBD(video) {
  var busy = false;

  function tick() {
    if (!camStream) return;
    if (busy) { requestAnimationFrame(tick); return; }
    busy = true;
    bd.detect(video)
    .then(function(codes) {
      if (codes && codes.length > 0) {
        var text = codes[0].rawValue;
        const now = Date.now();
        if (text !== lastCode || now - lastTime >= 3000) {
          lastCode = text; lastTime = now;
          onScan(text);
        }
      }
    })
    .catch(function() {})  // 忽略单帧错误
    .finally(function() { busy = false; requestAnimationFrame(tick); });
  }

  requestAnimationFrame(tick);
}

// ── 路径2: jsQR (纯JS通用降级) ─────────────
// 对齐 .74 scan.html：原始分辨率全图，一次jsQR
function startJsQR(video) {
  const canvas = $('cam-canvas');
  const ctx = canvas.getContext('2d');

  scanTimer = setInterval(function() {
    if (!camStream) return;
    if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    
    if (code && code.data) {
      const now = Date.now();
      if (code.data === lastCode && now - lastTime < 3000) return;
      lastCode = code.data; lastTime = now;
      onScan(code.data);
    }
  }, 300);
}


// ── 停止扫描（保留摄像头画面）───────────────
function stopScanner() {
  if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
}
function onScan(text) {
  stopScanner();
  var f = document.createElement('div'); f.className = 'scan-flash';
  document.body.appendChild(f);
  setTimeout(function(){ f.style.opacity='0'; setTimeout(function(){ f.remove(); },400); },50);
  setTimeout(function() { processCode(text); }, 200);
}

// ── 关闭摄像头 ───────────────────────────────
function closeCam() {
  if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
  if (camStream) {
    camStream.getTracks().forEach(function(t) { t.stop(); });
    camStream = null;
  }
  const v = $('cam-video');
  if (v) v.srcObject = null;
  flashOn = false;
  $('flash-btn').classList.add('off');
  $('scan-engine').textContent = '';
  show('main');
}

// ═══════════════════════════════════════════
//  拍照解码模块
// ═══════════════════════════════════════════

function openPhoto() {
  $('photo-input').click();
}

function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  toast('解码中...');

  const img = new Image();
  img.onload = function() {
    // 限制最大分辨率以加速解码
    const maxW = 1200;
    let w = img.width, h = img.height;
    if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }

    var canvas = document.createElement('canvas');
    canvas.width  = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);

    try {
      var imgData = ctx.getImageData(0, 0, w, h);
      const result = jsQR(imgData.data, w, h);
      if (result && result.data) {
        processCode(result.data);
      } else {
        // 全图失败 → 尝试中心裁剪
        const cx = Math.round(w * 0.25);
        const cy = Math.round(h * 0.25);
        const cw2 = Math.round(w * 0.5);
        const ch2 = Math.round(h * 0.5);
        const cropData = ctx.getImageData(cx, cy, cw2, ch2);
        const result2 = jsQR(cropData.data, cw2, ch2);
        if (result2 && result2.data) {
          processCode(result2.data);
        } else {
          toast('未能识别二维码，请确保二维码清晰完整');
          show('main');
        }
      }
    } catch(err) {
      toast('解码异常: ' + (err.message || '图片处理失败'));
      show('main');
    }
  };
  img.onerror = function() {
    toast('图片加载失败，请重试');
    show('main');
  };
  img.src = URL.createObjectURL(file);
  img.addEventListener('load', function() { URL.revokeObjectURL(img.src); });
  img.addEventListener('error', function() { URL.revokeObjectURL(img.src); });
  e.target.value = '';
}

// ═══════════════════════════════════════════
//  二维码内容处理模块
// ═══════════════════════════════════════════

function processCode(code) {
  // 数字编码(N前缀) → 通过 decode API 还原为 JSON
  if (/^N\d{10,}$/.test(code)) {
    toast('解码中...');
    fetch(API + '/mobile/decode/' + code, {
      credentials: 'same-origin',
      headers: { 'Authorization': 'Bearer ' + token() }
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) { toast(d.error); show('main'); return; }
      doScan(d.code);
    })
    .catch(function() { toast('解码失败'); show('main'); });
    return;
  }
  doScan(code);
}

function doScan(code) {
  toast('查询中...');
  fetch(API + '/mobile/scan', {
    credentials: 'same-origin',
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token() },
    body: JSON.stringify({ code: code })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.error) { toast(d.error); show('main'); return; }
    renderOrder(d.order);
    show('order');
    // 序列号模式：每张二维码对应1件工件，数量恒为1
    // 订单模式：取工序剩余待完成数
    var remaining = curSerial ? 1
      : Math.max(0, d.order.current_process
        ? (d.order.quantity || 0) - (d.order.current_process.completed || 0)
        : 1);
    $('rpt-qty').value = remaining;
    if (reportMode === 'auto') {
      setTimeout(function() { doReport(); }, 1200);
    } else {
      updateReportBtn();
    }
  })
  .catch(function(e) { console.log('scan auth fail — token:' + (token() ? 'yes' : 'no') + ' cookie:' + (document.cookie.indexOf('qr_token')>=0 ? 'yes' : 'no')); toast('网络错误，请检查连接'); show('main'); });
}

// ═══════════════════════════════════════════
//  订单展示 & 报工
// ═══════════════════════════════════════════

function renderOrder(o) {
  curOrder = o; curProcId = null; curSerial = '';
  var b = $('order-body'), cp = o.current_process, qty = o.quantity || 0;
  var h = '';

  h += '<div class="order-header"><div class="no">' + esc(o.order_no || '') + '</div>';
  h += '<div class="row"><span>产品</span><span>' + esc(o.product_name || '') + '</span></div>';
  h += '<div class="row"><span>客户</span><span>' + esc(o.customer || '') + '</span></div>';
  h += '<div class="row"><span>数量</span><span>' + qty + ' 件</span></div></div>';

  if (o.item) {
    curSerial = o.item.serial_no;
    h += '<div class="serial-card"><div class="label">序列号</div><div class="val">' + esc(o.item.serial_no) + '</div></div>';
  }

  if (cp) {
    var dn = cp.completed || 0, rm = Math.max(0, qty - dn);
    curProcId = cp.process_id;
    h += '<div class="cur-proc"><span class="badge">当前工序</span>';
    h += '<div class="name">' + esc(cp.process_name || '') + '</div>';
    h += '<div class="sub">已完成 ' + dn + '/' + qty + ' · 剩余 ' + rm + ' 件</div></div>';
  }

  h += '<div class="proc-card"><div class="title">工艺路线（' + (o.processes || []).length + ' 个工序）</div>';
  (o.processes || []).forEach(function(p) {
    var d = p.completed || 0;
    var s = 'pending';
    if (d >= qty) s = 'done';
    else if (p.process_id === (cp && cp.process_id)) s = 'active';
    h += '<div class="proc-item ' + s + '"><div class="pi-icon">' + (p.seq_order || '') + '</div>';
    h += '<div class="pi-info"><div class="pi-name">' + esc(p.process_name) + '</div>';
    h += '<div class="pi-meta">已完成 ' + d + '/' + qty + '</div></div>';
    h += '<div class="pi-st">' + (s === 'done' ? '已完成' : s === 'active' ? '进行中' : '待处理') + '</div></div>';
  });
  h += '</div>';
  b.innerHTML = h;
}

// ── 报工模式 ─────────────────────────────────
function switchMode(mode) {
  reportMode = mode;
  $('mode-auto').classList.toggle('active', mode === 'auto');
  $('mode-manual').classList.toggle('active', mode === 'manual');
  $('report-form').style.display = (mode === 'manual' ? 'block' : 'none');
  updateReportBtn();
}

function setReportType(type) {
  reportType = type;
  ['normal','scrap','rework'].forEach(function(t) {
    $('rtype-' + t).classList.toggle('active', t === type);
  });
  $('reason-row').style.display = (type === 'normal') ? 'none' : 'block';
  updateReportBtn();
}

function updateReportBtn() {
  const btn = $('btn-report');
  var qty = parseInt($('rpt-qty').value) || 0;
  if (qty <= 0) { btn.disabled = true; btn.textContent = '已完成全部报工'; return; }
  const label = reportType === 'normal' ? '正常' : reportType === 'scrap' ? '报废' : '返修';
  if (reportMode === 'auto') {
    btn.textContent = '⚡ 自动报工 ' + qty + ' 件 (' + label + ')';
    btn.disabled = false;
  } else {
    btn.textContent = '✋ 提交报工 ' + qty + ' 件 (' + label + ')';
    btn.disabled = !curOrder || !curProcId;
  }
  btn.className = 'btn-report' + (reportType !== 'normal' ? ' ' + reportType : '');
}

$('rpt-qty').addEventListener('input', updateReportBtn);

// ── 提交报工 ─────────────────────────────────
function doReport() {
  if (!curOrder || !curProcId) { toast('订单信息不完整'); return; }
  const btn = $('btn-report');
  btn.disabled = true; btn.innerHTML = '<span class=\"spin\"></span>提交中...';

  var body = {
    order_id: curOrder.id,
    process_id: curProcId,
    quantity: parseInt($('rpt-qty').value) || 1,
    type: reportType
  };
  if (reportType !== 'normal') {
    body.reason = ($('rpt-reason').value || '').trim() || '未填写';
  }
  if (curSerial) body.serial_no = curSerial;

  fetch(API + '/mobile/report', {
    credentials: 'same-origin',
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token() },
    body: JSON.stringify(body)
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.error) { toast(d.error); btn.disabled = false; updateReportBtn(); return; }
    const qty = body.quantity || 1;
    const label = reportType === 'normal' ? '正常报工' : reportType === 'scrap' ? '报废' : '返修';
    $('ok-msg').textContent = (curOrder.order_no || '') + ' · ' + (curOrder.current_process && curOrder.current_process.process_name || '');
    $('ok-detail').innerHTML =
      '<div>📦 订单: ' + esc(curOrder.order_no || '') + '</div>' +
      '<div>⚙️ 工序: ' + esc(curOrder.current_process && curOrder.current_process.process_name || '') + '</div>' +
      '<div>📊 数量: ' + qty + ' 件</div>' +
      '<div>🏷️ 类型: ' + label + '</div>' +
      '<div>👤 操作人: ' + esc(d.worker ? d.worker.name : (user() ? user().name : '未知')) + '</div>';
    show('ok');
  })
  .catch(function() { toast('网络错误'); btn.disabled = false; updateReportBtn(); });
}

// ═══════════════════════════════════════════
//  登录 / 主页面 / 闪光灯
// ═══════════════════════════════════════════

function doLogin() {
  const u = $('inp-user').value.trim(), p = $('inp-pwd').value;
  if (!u || !p) { toast('请输入用户名和密码'); return; }
  const btn = $('btn-login');
  btn.disabled = true; btn.innerHTML = '<span class=\"spin\"></span>登录中...';
  fetch(API + '/auth/login', {
    credentials: 'same-origin',
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: u, password: p })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    btn.disabled = false; btn.textContent = '登 录';
    if (d.error) { $('login-err').textContent = d.error; return; }
    window.__qr_user = d.user;
    try { sessionStorage.setItem('qr_user', JSON.stringify(d.user)); } catch(e) {}
    try { sessionStorage.setItem('qr_token', d.user.token); } catch(e) {}
    goMain();
  })
  .catch(function() { $('login-err').textContent = '网络错误'; btn.disabled = false; btn.textContent = '登 录'; });
}

function doLogout() {
  window.__qr_user = null;
  try { sessionStorage.removeItem('qr_user'); } catch(e) {}
  try { sessionStorage.removeItem('qr_token'); } catch(e) {}
  show('login');
}

function goMain() {
  $('inp-code').value = '';
  curOrder = null; curProcId = null; curSerial = '';
  reportMode = 'auto'; reportType = 'normal';
  switchMode('auto');
  setReportType('normal');
  var u = user();
  $('top-user').textContent = (u ? (u.name || u.username) : '扫码报工');
  $('manual-row').style.display = 'none';
  show('main');
  loadStats();
  loadRecent();
}

function goBack() { curOrder = null; show('main'); loadStats(); loadRecent(); }

function toggleManual() {
  var row = $('manual-row');
  row.style.display = row.style.display === 'flex' ? 'none' : 'flex';
  if (row.style.display === 'flex') setTimeout(function(){ $('inp-code').focus(); }, 100);
}

function loadStats() {
  fetch(API + '/dashboard', { credentials: 'same-origin', headers: { 'Authorization': 'Bearer ' + token() } })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d && d.stats) {
        $('st-today').textContent = d.stats.today_records || 0;
        $('st-qty').textContent = d.stats.today_output || 0;
      }
    })
    .catch(function() { console.log('stats auth fail — token:' + (token() ? 'yes' : 'no')); });
}

function loadRecent() {
  fetch(API + '/report-logs?limit=5', { credentials: 'same-origin', headers: { 'Authorization': 'Bearer ' + token() } })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      const list = d.logs || [];
      const el = $('recent-list');
      if (!list.length) { el.innerHTML = '<div class="empty-recent"><span class="icon">📋</span>暂无记录</div>'; return; }
      el.innerHTML = list.slice(0, 5).map(function(r) {
        const cls = r.work_status === 'scrap' ? 'scrap' : r.work_status === 'rework' ? 'rework' : 'normal';
        const lbl = r.work_status === 'scrap' ? '报废' : r.work_status === 'rework' ? '返修' : '正常';
        const time = (r.created_at || '').replace('T', ' ').substring(5, 16);
        return '<div class="recent-item">' +
          '<div class="ri-left"><div class="ri-no">' + esc(r.order_no || '') + ' · ' + esc(r.process_name || '') + '</div>' +
          '<div class="ri-meta">' + time + ' · ' + (r.quantity || 0) + '件</div></div>' +
          '<span class="ri-type ' + cls + '">' + lbl + '</span></div>';
      }).join('');
    })
    .catch(function() { console.log('stats auth fail — token:' + (token() ? 'yes' : 'no')); });
}

function manualSearch() {
  const c = $('inp-code').value.trim();
  if (!c) { toast('请输入订单号或序列号'); return; }
  processCode(c);
}

function toggleFlash() {
  if (!camStream) return;
  const track = camStream.getVideoTracks()[0];
  if (!track || typeof track.applyConstraints !== 'function') {
    toast('此设备不支持闪光灯');
    return;
  }
  flashOn = !flashOn;
  track.applyConstraints({ advanced: [{ torch: flashOn }] })
    .then(function() { $('flash-btn').classList.toggle('off', !flashOn); })
    .catch(function() { toast('闪光灯不可用'); });
}

// ═══════════════════════════════════════════
//  初始化
// ═══════════════════════════════════════════
(function() {
  // Restore session if user was previously logged in (sessionStorage + valid cookie)
  if (user()) {
    // Verify cookie is still valid with a lightweight API call
    fetch(API + '/auth/info', { credentials: 'same-origin', headers: { 'Authorization': 'Bearer ' + token() } })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d && d.user) { goMain(); }
        else { doLogout(); }
      })
      .catch(function() { doLogout(); });
  } else {
    show('login');
  }

  // === Event listeners (migrated from inline handlers for CSP strict mode) ===
  var _el = document.getElementById('btn-login');
  if (_el) _el.addEventListener('click', doLogin);
  
  _el = document.querySelector('.hero-scan');
  if (_el) _el.addEventListener('click', openCam);
  
  var _subBtns = document.querySelectorAll('.sub-btn');
  if (_subBtns[0]) _subBtns[0].addEventListener('click', openPhoto);
  if (_subBtns[1]) _subBtns[1].addEventListener('click', toggleManual);
  
  _el = document.querySelector('#manual-row button');
  if (_el) _el.addEventListener('click', manualSearch);
  
  _el = document.getElementById('photo-input');
  if (_el) _el.addEventListener('change', handlePhoto);
  
  _el = document.querySelector('#manual-row input');
  if (_el) _el.addEventListener('keyup', function(e) { if (e.key === 'Enter') manualSearch(); });
  
  _el = document.querySelector('.recent-title span[style*="cursor:pointer"]');
  if (_el) _el.addEventListener('click', loadRecent);
  
  _el = document.querySelector('.bottom-link');
  if (_el) _el.addEventListener('click', doLogout);
  
  _el = document.querySelector('.top-btn');
  if (_el) _el.addEventListener('click', goBack);
  
  _el = document.getElementById('mode-auto');
  if (_el) _el.addEventListener('click', function() { switchMode('auto'); });
  
  _el = document.getElementById('mode-manual');
  if (_el) _el.addEventListener('click', function() { switchMode('manual'); });
  
  _el = document.getElementById('rtype-normal');
  if (_el) _el.addEventListener('click', function() { setReportType('normal'); });
  
  _el = document.getElementById('rtype-scrap');
  if (_el) _el.addEventListener('click', function() { setReportType('scrap'); });
  
  _el = document.getElementById('rtype-rework');
  if (_el) _el.addEventListener('click', function() { setReportType('rework'); });
  
  _el = document.getElementById('btn-report');
  if (_el) _el.addEventListener('click', doReport);
  
  _el = document.querySelector('.btn-done');
  if (_el) _el.addEventListener('click', goMain);
  
  _el = document.getElementById('flash-btn');
  if (_el) _el.addEventListener('click', toggleFlash);
  
  _el = document.querySelector('.close-btn');
  if (_el) _el.addEventListener('click', closeCam);
  $('inp-pwd').addEventListener('keyup', function(e) { if (e.key === 'Enter') doLogin(); });
  $('inp-user').addEventListener('keyup', function(e) { if (e.key === 'Enter') $('inp-pwd').focus(); });
  $('inp-code').addEventListener('keyup', function(e) { if (e.key === 'Enter') manualSearch(); });
  window.addEventListener('beforeunload', function() {
    if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
    if (camStream) { camStream.getTracks().forEach(function(t) { t.stop(); }); camStream = null; }
  });
  // Responsive viewport height (Honor/Huawei virtual nav bar fix)
  function setVH() { document.documentElement.style.setProperty('--vh', (window.innerHeight * 0.01) + 'px'); }
  window.addEventListener('resize', setVH);
  window.addEventListener('orientationchange', function() { setTimeout(setVH, 100); });
  setVH();
})();
</script>

<script nonce="{$ nonce $}">
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").then(function(reg) {
    console.log("SW registered:", reg.scope);
    reg.addEventListener("updatefound", function() {
      var worker = reg.installing;
      worker.addEventListener("statechange", function() {
        if (worker.state === "activated" && navigator.serviceWorker.controller) {
          var toast = document.createElement("div");
          toast.style.cssText = "position:fixed;top:0;left:0;right:0;background:#4F46E5;color:#fff;text-align:center;padding:8px;z-index:9999;cursor:pointer";
          toast.textContent = "有新版本，点击刷新";
          toast.addEventListener("click", function() { location.reload(); });
          document.body.appendChild(toast);
          setTimeout(function() { toast.remove(); }, 5000);
        }
      });
    });
  }).catch(function(e) { console.log("SW failed:", e); });

  // Offline indicator
  window.addEventListener("online", function() {
    var bar = document.getElementById("offline-bar");
    if (bar) bar.remove();
  });
  window.addEventListener("offline", function() {
    var bar = document.createElement("div");
    bar.id = "offline-bar";
    bar.style.cssText = "position:fixed;top:0;left:0;right:0;background:#F59E0B;color:#fff;text-align:center;padding:6px;z-index:9999;font-size:14px";
    bar.textContent = "当前离线 - 数据将在恢复网络后同步";
    document.body.appendChild(bar);
  });
  if (!navigator.onLine) {
    window.dispatchEvent(new Event("offline"));
  }
}
</script>
