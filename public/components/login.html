
  <div class="login-card">
    <h2>🔐 系统登录</h2>
    <div class="form-group">
      <label>用户名</label>
      <input class="form-input" v-model="username" placeholder="请输入用户名" 
        @keyup.enter="handleSubmit" autofocus>
    </div>
    <div class="form-group" style="margin-top:16px">
      <label>密码</label>
      <input class="form-input" v-model="password" type="password" 
        placeholder="请输入密码" @keyup.enter="handleSubmit">
    </div>
    <div v-if="error" style="color:var(--danger);font-size:var(--text-sm);margin-top:8px">{{ error }}</div>
    <button class="btn btn-primary" style="width:100%;margin-top:20px;padding:var(--space-3)" 
      @click="handleSubmit" :disabled="loading">
      <span v-if="!loading">登 录</span>
      <span v-else>登录中...</span>
    </button>
  </div>
