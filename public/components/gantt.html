
  <div style="padding:24px;max-width:100%;overflow-x:auto">
    <div class="summary-bar">
      <div class="card" style="flex:1;padding:var(--space-3) 20px;border-left:3px solid #6B7280;display:flex;align-items:center;gap:var(--space-3)">
        <div style="font-size:28px">📅</div>
        <div><div style="font-size:22px;font-weight:700;color:#6B7280">{{ stats.total }}</div><div style="font-size:13px;color:var(--text-muted)">总订单</div></div>
      </div>
      <div class="card" style="flex:1;padding:var(--space-3) 20px;border-left:3px solid #2563eb;display:flex;align-items:center;gap:var(--space-3)">
        <div style="font-size:28px">⚙️</div>
        <div><div style="font-size:22px;font-weight:700;color:#2563eb">{{ stats.producing }}</div><div style="font-size:13px;color:var(--text-muted)">生产中</div></div>
      </div>
      <div class="card" style="flex:1;padding:var(--space-3) 20px;border-left:3px solid #9ca3af;display:flex;align-items:center;gap:var(--space-3)">
        <div style="font-size:28px">⏳</div>
        <div><div style="font-size:22px;font-weight:700;color:#9ca3af">{{ stats.pending }}</div><div style="font-size:13px;color:var(--text-muted)">待生产</div></div>
      </div>
      <div class="card" style="flex:1;padding:var(--space-3) 20px;border-left:3px solid var(--success);display:flex;align-items:center;gap:var(--space-3)">
        <div style="font-size:28px">✅</div>
        <div><div style="font-size:22px;font-weight:700;color:var(--success)">{{ stats.completed }}</div><div style="font-size:13px;color:var(--text-muted)">已完成</div></div>
      </div>
    </div>

    <div class="card" style="border-radius:14px;overflow:hidden;padding:0">
      <div class="card-header" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:var(--space-3) 20px;border-bottom:1px solid #f3f4f6">
        <h3 style="font-size:16px;font-weight:700;color:#1f2937;display:flex;align-items:center;gap:8px;margin:0">
          <span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:linear-gradient(135deg,var(--primary),var(--primary-accent));border-radius:var(--radius-md);font-size:16px;color:white">📅</span>
          生产排程
        </h3>
        <div style="display:flex;gap:8px;align-items:center;margin-left:auto">
          <select v-model="statusFilter" class="form-input" style="width:120px;padding:6px 10px;font-size:13px">
            <option value="all">全部状态</option>
            <option value="pending">待生产</option>
            <option value="producing">生产中</option>
            <option value="completed">已完成</option>
          </select>
          <button @click="zoomOut" title="缩小" class="btn-default btn-sm" style="font-size:16px;padding:4px 10px">−</button>
          <button @click="zoomIn" title="放大" class="btn-default btn-sm" style="font-size:16px;padding:4px 10px">+</button>
          <span style="color:var(--text-placeholder);font-size:13px">{{ filteredOrders.length }} 个订单</span>
        </div>
      </div>

      <div v-if="loading" style="text-align:center;padding:60px;color:var(--text-placeholder)">⏳ 加载中...</div>
      <div v-else-if="!filteredOrders.length" style="text-align:center;padding:60px;color:var(--text-placeholder)"><p style="font-size:48px;margin:0">📅</p><p style="margin-top:12px">暂无排程数据</p></div>
      <div v-else style="overflow-x:auto;border-top:1px solid #f3f4f6">
        <div style="display:flex;border-bottom:1px solid #e5e7eb;position:sticky;top:0;background:#f9fafb;z-index:2">
          <div style="min-width:180px;padding:var(--space-3) 14px;font-weight:600;color:#6B7280;font-size:13px;border-right:1px solid #e5e7eb;flex-shrink:0">订单</div>
          <div style="display:flex;flex:1;overflow:hidden">
            <div v-for="d in ganttData.days" :key="d.date" :style="{minWidth:dayWidth+'px',padding:'6px 2px',textAlign:'center',fontSize:'var(--text-xs-alt)',color:d.isToday?'var(--primary)':'var(--text-placeholder)',borderRight:'1px solid #f3f4f6',background:d.isToday?'#EEF2FF':'',fontWeight:d.isToday?'600':'400',flexShrink:0}">{{ d.label }}</div>
          </div>
        </div>
        <div v-for="(o, i) in filteredOrders" :key="o.id" style="display:flex;border-bottom:1px solid #f3f4f6;min-height:44px;align-items:center" :style="{background:i%2===0?'#fff':'#fafbfc'}">
          <div style="min-width:180px;padding:8px 14px;border-right:1px solid #e5e7eb;flex-shrink:0;display:flex;flex-direction:column;gap:var(--space-1)">
            <span style="font-size:13px;font-weight:600;color:var(--primary)">{{ o.order_no }}</span>
            <span style="font-size:var(--text-xs-alt);color:var(--text-placeholder)">{{ o.product_name }} · {{ o.customer_name }}</span>
          </div>
          <div style="position:relative;flex:1;height:32px" :style="{minWidth:ganttData.totalDays*dayWidth+'px'}">
            <div :style="{position:'absolute',left:barLeft(o)+'px',width:Math.max(barWidth(o)-2,dayWidth-2)+'px',top:'4px',height:'24px',borderRadius:'5px',background:barColor(o.status),display:'flex',alignItems:'center',justifyContent:'center',fontSize:'var(--text-2xs)',color:'#fff',padding:'0 4px',overflow:'hidden',whiteSpace:'nowrap',fontWeight:'500'}">{{ o.progress }}%</div>
          </div>
        </div>
      </div>

      <div style="display:flex;gap:20px;padding:12px 20px;font-size:12px;color:var(--text-placeholder);border-top:1px solid #f3f4f6">
        <span><span style="display:inline-block;width:12px;height:12px;border-radius:var(--radius-sm);background:#2563eb;margin-right:4px;vertical-align:middle"></span> 生产中</span>
        <span><span style="display:inline-block;width:12px;height:12px;border-radius:var(--radius-sm);background:#9ca3af;margin-right:4px;vertical-align:middle"></span> 待生产</span>
        <span><span style="display:inline-block;width:12px;height:12px;border-radius:var(--radius-sm);background:#16a34a;margin-right:4px;vertical-align:middle"></span> 已完成</span>
      </div>
    </div>
  </div>
