<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>质量抽检</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column;padding-bottom:20px}
.header{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:16px 20px;text-align:center;font-size:18px;font-weight:700}
#info{background:#fff;margin:12px;padding:16px;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);text-align:center;font-size:14px;line-height:1.6}
.proc-section{margin:8px 12px}
.proc-section h3{font-size:15px;color:#374151;margin-bottom:8px;padding-left:4px}
.proc-list{display:flex;flex-direction:column;gap:8px}
.proc-item{background:#fff;padding:14px 16px;border-radius:10px;border:2px solid #e5e7eb;cursor:pointer;font-size:15px;display:flex;align-items:center;gap:10px;transition:all .2s;user-select:none;-webkit-tap-highlight-color:transparent}
.proc-item.selected{border-color:#6366f1;background:#eef2ff}
.proc-item .dot{width:20px;height:20px;border-radius:50%;border:2px solid #d1d5db;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.proc-item.selected .dot{border-color:#6366f1;background:#6366f1}
.proc-item.selected .dot::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}
.proc-item .pname{flex:1;font-weight:500}
.proc-item .pstat{color:#9ca3af;font-size:12px}
#actionArea{margin:16px 12px;background:#fff;padding:16px;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
#actionArea .sel{padding:10px 14px;background:#eef2ff;border-radius:8px;text-align:center;font-weight:600;color:#4f46e5;margin-bottom:14px;font-size:14px}
.btns{display:flex;gap:10px;justify-content:center}
.btns button{flex:1;min-width:80px;padding:14px 10px;border:none;border-radius:10px;font-size:16px;font-weight:700;color:#fff;cursor:pointer;transition:opacity .2s}
.btns button:active{opacity:.8}
.btns button:disabled{opacity:.4;cursor:not-allowed}
.btn-pass{background:#10b981}
.btn-rework{background:#f59e0b}
.btn-scrap{background:#ef4444}
#remark{width:100%;margin-top:12px;padding:12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none}
#remark:focus{border-color:#6366f1}
.msg{padding:12px;margin:12px;border-radius:8px;text-align:center;font-size:14px;display:none}
.msg.info{background:#dbeafe;color:#1e40af;display:block}
.msg.success{background:#d1fae5;color:#065f46;display:block}
.msg.error{background:#fee2e2;color:#991b1b;display:block}
.loading{text-align:center;padding:40px;color:#9ca3af;font-size:14px}
</style>
</head>
<body>
<div class="header">&#128269; 质量抽检</div>
<div id="info"><div class="loading">查询中...</div></div>
<div id="msg" class="msg"></div>
<div id="processSection" style="display:none">
  <div class="proc-section">
    <h3>&#128203; 选择抽检工序</h3>
    <div class="proc-list" id="processList"></div>
  </div>
</div>
<div id="actionArea">
  <div class="sel">&#128295; 已选工序：<span id="selectedProcess">请先选择上方工序</span></div>
  <div class="btns">
    <button class="btn-pass" id="btn-pass" disabled>&#9989; 合格</button>
    <button class="btn-rework" id="btn-rework" disabled>&#128260; 返修</button>
    <button class="btn-scrap" id="btn-scrap" disabled>&#10060; 报废</button>
  </div>
  <input id="remark" placeholder="备注（选填）">
</div>
<script src="/js/mobile/inspection.js?v=5"></script>
</body>
</html>
